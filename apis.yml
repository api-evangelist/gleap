name: Gleap
description: Gleap is an in-app customer feedback and bug reporting platform with AI agents that automates the loop from user feedback through code deployment. It provides a REST API for managing feedback tickets, feature requests, roadmaps, real-time widget configuration, help center articles, outbound messaging, and user identity tracking used by 4,500+ teams globally.
