      - in: query
        name: paginated
        required: false
        schema:
          type: boolean
      - in: query
        name: before
        required: false
        schema:
          type: string
      - description: '- Maximum number of messages to return (default: no limit, max:
          10000)'
        in: query
        name: limit
        required: false
        schema:
          format: double
          type: number
        example: '50'
