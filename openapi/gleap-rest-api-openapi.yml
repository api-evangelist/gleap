                - properties:
                    eventData: {}
                    checklistTasks: {}
                    outboundHistory: {}
                    plan:
                      type: string
                    telegramUsername:
                      type: string
                    telegramChatId:
                      type: string
                    instagramUsername:
                      type: string
                    instagramId:
                      type: string
                    facebookId:
                      type: string
                    phone:
                      type: string
                    sla:
                      type: number
                      format: double
                    companyName:
                      type: string
