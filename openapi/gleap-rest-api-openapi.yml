    get:
      operationId: GetSessions
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                items: {}
                type: array
      description: Get all sessions associated with a project.
      summary: Get all sessions
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
