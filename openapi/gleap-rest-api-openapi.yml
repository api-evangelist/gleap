      description: Get a session by id.
      summary: Get a session
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: path
        name: sessionId
        required: true
        schema:
          type: string
      - in: header
        name: project
        required: true
        schema:
          type: string
    delete:
      operationId: DeleteSession
      responses:
        '204':
          description: No content
      description: Delete a session by id.
      summary: Delete a session
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: path
        name: sessionId
        required: true
        schema:
          type: string
      - in: header
        name: project
        required: true
        schema:
          type: string
  /sessions/{sessionId}/resubscribe:
    put:
      operationId: ResubscribeSession
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: boolean
      description: Resubscribe a session.
      summary: Resubscribe a session
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: path
        name: sessionId
        required: true
        schema:
          type: string
      - in: header
        name: project
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties: {}
              type: object
  /sessions/search:
    get:
      operationId: SearchSessions
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                items: {}
                type: array
      description: Search for sessions.
      summary: Search for sessions
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
  /sessions/export:
    get:
      operationId: ExportSessions
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema: {}
      description: Export sessions.
      summary: Export sessions
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
  /sessions/warmup:
    post:
      operationId: WarmupSessions
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                properties:
                  ok:
                    type: boolean
                required:
                - ok
                type: object
      description: 'Pre-warm OpenSearch shards + Redis list cache for the active project.

        Fire-and-forget: returns {ok:true} immediately while the warmup runs in

        the background. Triggered from the frontend right before a session query

        is likely (sidebar hover, global search modal mount, RecipientPicker mount,

        periodic refresh while on the Sessions page) so the user doesn''t pay the

        cold-shard penalty on first interaction.'
      summary: Pre-warm sessions cache for the active project
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
  /sessions/by-user-id/{userId}:
    get:
      operationId: FindSessionByUserId
      responses:
        '200':
          description: Ok
          content:
