info:
  title: Gleap API
  version: 14.0.0
  contact:
    name: Gleap Support
    email: hello@gleap.io
    url: https://gleap.io
  description: The Gleap REST API provides programmatic access to feedback tickets,
    user identification, event tracking, help center content, outbound messaging,
    sessions, contacts, and AI-powered support workflows. The API uses Bearer token
    authentication and supports filtering, pagination, and webhook integrations.
  license:
    name: Proprietary
openapi: 3.0.0
paths:
  /message-templates:
    post:
      operationId: CreateMessageTemplate
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplateDocument'
      description: Create a new message template.
      summary: Create a new message template.
      tags:
      - Message templates
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageTemplateDTO'
    get:
      operationId: FindMessageTemplates
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                anyOf:
                - items:
                    $ref: '#/components/schemas/MessageTemplateDocument'
                  type: array
                - properties:
                    totalCount:
                      type: number
                      format: double
                    data:
                      items:
                        $ref: '#/components/schemas/MessageTemplateDocument'
                      type: array
                  required:
                  - totalCount
                  - data
                  type: object
      description: Find all message templates of a project.
      summary: Find all message templates.
      tags:
      - Message templates
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
      - in: query
        name: limit
        required: false
        schema:
          format: double
          type: number
      - in: query
        name: skip
        required: false
        schema:
          format: double
          type: number
      - in: query
        name: searchTerm
        required: false
        schema:
          type: string
      - in: query
        name: visibility
        required: false
        schema:
          type: string
      - in: query
        name: withCount
        required: false
        schema:
          type: boolean
  /message-templates/{messageTemplateId}:
    get:
      operationId: FindMessageTemplateById
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplateDocument'
      description: Find all message templates of a project.
      summary: Find all message templates.
      tags:
      - Message templates
      security:
      - jwt: []
      parameters:
      - in: path
        name: messageTemplateId
        required: true
        schema:
          type: string
      - in: header
        name: project
        required: true
        schema:
          type: string
    put:
      operationId: UpdateTeam
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplateDocument'
      description: Update a message template.
      summary: Update a message template.
      tags:
      - Message templates
      security:
      - jwt: []
      parameters:
      - in: path
        name: messageTemplateId
        required: true
        schema:
          type: string
      - in: header
        name: project
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageTemplateDTO'
    delete:
      operationId: DeleteMessageTemplate
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageTemplateDocument'
      description: Delete a message template.
      summary: Delete a message template
      tags:
      - Message templates
      security:
      - jwt: []
      parameters:
      - in: path
        name: messageTemplateId
        required: true
        schema:
          type: string
      - in: header
        name: project
        required: true
        schema:
          type: string
  /sessions:
    post:
      operationId: CreateSession
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema: {}
      description: Create a new session and associate it with a project.
      summary: Create a new session
      tags:
      - Session
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
