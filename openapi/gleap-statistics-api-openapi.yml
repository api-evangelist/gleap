        name: chartType
        required: true
        schema: {}
      - description: '- Timezone for date calculations'
        in: query
        name: timezone
        required: false
        schema:
          type: string
      - in: query
        name: groupInterval
        required: false
        schema:
          type: string
          enum:
          - day
          - month
          - year
      - description: '- Number of records to skip (pagination)'
        in: query
        name: skip
        required: false
        schema:
          format: double
          type: number
      - description: '- Maximum number of records to return'
        in: query
        name: limit
        required: false
        schema:
          format: double
          type: number
      - in: query
        name: groupedBy
        required: false
        schema:
          type: string
      - in: query
        name: aggsType
        required: false
