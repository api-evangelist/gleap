openapi: 3.0.0
info:
  title: Gleap AI content Statistics API
  version: 14.0.0
  contact:
    name: Gleap Support
    email: hello@gleap.io
    url: https://gleap.io
  description: The Gleap REST API provides programmatic access to feedback tickets, user identification, event tracking, help center content, outbound messaging, sessions, contacts, and AI-powered support workflows. The API uses Bearer token authentication and supports filtering, pagination, and webhook integrations.
  license:
    name: Proprietary
servers:
- url: https://api.gleap.io/v3
tags:
- name: Statistics
paths:
  /statistics/bar-chart:
    get:
      operationId: GetChartData
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema: {}
      description: Get bar chart data for various statistics
      tags:
      - Statistics
      security:
      - jwt: []
      parameters:
      - description: '- Type of chart data to retrieve (e.g., NEW_TICKETS_COUNT, MEDIAN_FIRST_RESPONSE_TIME)'
        in: query
        name: chartType
        required: true
        schema: {}
      - description: '- Timezone for date calculations (e.g., "America/New_York")'
        in: query
        name: timezone
        required: false
        schema:
          type: string
      - description: '- Grouping interval ("day", "month", "year")'
        in: query
        name: groupInterval
        required: false
        schema:
          type: string
          enum:
          - day
          - month
          - year
      - in: query
        name: skip
        required: false
        schema:
          format: double
          type: number
      - in: query
        name: limit
        required: false
        schema:
          format: double
          type: number
      - in: query
        name: groupedBy
        required: false
        schema:
          type: string
      - description: '- Aggregation type ("MEDIAN", "AVERAGE")'
        in: query
        name: aggsType
        required: false
        schema:
          type: string
      - description: '- Start date for filtering (ISO format)'
        in: query
        name: startDate
        required: false
        schema:
          type: string
      - description: '- End date for filtering (ISO format)'
        in: query
        name: endDate
        required: false
        schema:
          type: string
      - in: query
        name: createdAt
        required: false
        schema:
          type: string
      - in: query
        name: updatedAt
        required: false
        schema:
          type: string
      - in: query
        name: outbound
        required: false
        schema:
          type: string
