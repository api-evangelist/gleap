      - in: header
        name: project
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema: {}
    delete:
      operationId: DeleteNewsArticle
      responses:
        '204':
          description: No content
      summary: Delete a news article.
      tags:
      - Engagement News
      security:
