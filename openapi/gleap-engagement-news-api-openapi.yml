openapi: 3.0.0
info:
  title: Gleap AI content Engagement News API
  version: 14.0.0
  contact:
    name: Gleap Support
    email: hello@gleap.io
    url: https://gleap.io
  description: The Gleap REST API provides programmatic access to feedback tickets, user identification, event tracking, help center content, outbound messaging, sessions, contacts, and AI-powered support workflows. The API uses Bearer token authentication and supports filtering, pagination, and webhook integrations.
  license:
    name: Proprietary
servers:
- url: https://api.gleap.io/v3
tags:
- name: Engagement News
paths:
  /engagement/news:
    post:
      operationId: CreateNewsArticle
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundDocument'
      summary: Create a new engagement news article
      tags:
      - Engagement News
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema: {}
    get:
      operationId: GetNewsArticles
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/OutboundDocument'
                type: array
      summary: Get all engagement news articles
      tags:
      - Engagement News
      security:
      - jwt: []
      parameters:
      - in: header
        name: project
        required: true
        schema:
          type: string
      - in: query
        name: withoutChangelogs
        required: false
        schema:
          type: string
  /engagement/news/{newsId}:
    get:
      operationId: GetNewsArticle
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboundDocument'
      summary: Get an engagement news article
      tags:
      - Engagement News
      security:
      - jwt: []
      parameters:
      - in: path
        name: newsId
        required: true
        schema:
          type: string
      - in: header
        name: project
        required: true
        schema:
          type: string
